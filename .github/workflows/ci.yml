name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Set up environment variables
      run: |
        echo "DEEPGRAM_API_KEY=test_key" >> $GITHUB_ENV
        echo "GROQ_API_KEY=test_key" >> $GITHUB_ENV
        echo "ELEVENLABS_API_KEY=test_key" >> $GITHUB_ENV
        echo "TWILIO_ACCOUNT_SID=test_sid" >> $GITHUB_ENV
        echo "TWILIO_AUTH_TOKEN=test_token" >> $GITHUB_ENV
        echo "FROM_NUMBER=+1234567890" >> $GITHUB_ENV
        echo "SERVER=test.example.com" >> $GITHUB_ENV
        echo "MONGO_DB_URL=mongodb://localhost:27017" >> $GITHUB_ENV
        echo "SENTRY_SDK_URL=https://test@sentry.io/123" >> $GITHUB_ENV
        echo "KOALA_ACCESS_KEY=test_key" >> $GITHUB_ENV

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Check code formatting with black
      run: |
        black --check .

    - name: Check imports with isort
      run: |
        isort --check-only .

    - name: Type check with mypy
      run: |
        mypy . --ignore-missing-imports --no-strict-optional

    - name: Test with pytest
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ai-call-agent:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ai-call-agent:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
